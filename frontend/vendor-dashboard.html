<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Portal | VMS Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-dashboard.css">
    <script src="js/config.js"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="brand">
            <i class="fas fa-truck-fast"></i>
            <span>VMS VENDOR</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a class="nav-link active" onclick="showSection('orders')" id="nav-orders">
                    <i class="fas fa-box-archive"></i> Purchase Orders
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link" onclick="showSection('invoices')" id="nav-invoices">
                    <i class="fas fa-file-invoice-dollar"></i> Invoices
                </a>
            </div>
            
            <div style="margin: 20px 0; border-top: 1px solid #f1f5f9;"></div>

            <div class="nav-item">
                <a class="nav-link" href="javascript:void(0)" id="themeToggle">
                    <i class="fas fa-moon"></i> Theme
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link text-danger" href="javascript:void(0)" onclick="handleLogout()">
                    <i class="fas fa-power-off"></i> Logout
                </a>
            </div>
        </nav>
    </div>

            <!-- Main Content -->
            <div class="main-content">
                <header class="d-flex justify-content-between align-items-center mb-5 animate-fade-in">
                    <div>
                        <h1 class="fw-bold mb-1"><span id="userNameDisplay">Vendor</span> Workspace</h1>
                        <p class="text-secondary">Track your orders and manage invoices from one premium portal.</p>
                    </div>
                </header>

                <!-- Purchase Orders Section -->
                <div id="ordersSection" class="animate-fade-in">
                    <div class="glass-card p-0 overflow-hidden">
                        <div class="px-4 py-3 border-bottom bg-white">
                            <h5 class="mb-0 fw-bold">My Purchase Orders</h5>
                        </div>
                        <div class="table-responsive">
                            <table class="custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>PO #</th>
                                        <th>Description</th>
                                        <th>Delivery Date</th>
                                        <th>Value ($)</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="poTableBody">
                                    <!-- POs go here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Invoices Section -->
                <div id="invoicesSection" style="display:none;" class="animate-fade-in">
                    <div class="glass-card p-0 overflow-hidden">
                        <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center bg-white">
                            <h5 class="mb-0 fw-bold">My Invoices</h5>
                            <button class="btn-premium btn-sm" onclick="showInvoiceModal()">
                                <i class="fas fa-plus"></i> Process Invoice
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Invoice #</th>
                                        <th>PO Ref</th>
                                        <th>Date</th>
                                        <th>Amount ($)</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="invoiceTableBody">
                                    <!-- Invoices go here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Invoice Modal -->
    <div class="modal fade" id="addInvoiceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Submit Invoice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addInvoiceForm">
                        <div class="mb-3">
                            <label class="form-label">Select PO</label>
                            <select class="form-select" name="purchaseOrderId" id="invoicePoSelect" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Invoice Reference #</label>
                            <input type="text" class="form-control" name="invoiceNumber" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount ($)</label>
                            <input type="number" step="0.01" class="form-control" name="amount" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Invoice Date</label>
                            <input type="date" class="form-control" name="invoiceDate" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitInvoice()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script>
        let currentUserId = null;
        let vendorId = null;

        async function handleLogout() {
            try {
                await fetch(`${API_BASE_URL}/logout`, { method: 'POST' });
            } catch (e) {}
            window.location.href = 'login.html';
        }

        async function init() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/user`, { credentials: 'include' });
                if (response.ok) {
                    const userInfo = await response.json();
                    currentUserId = userInfo.id;
                    vendorId = userInfo.vendorId;
                    document.getElementById('userNameDisplay').textContent = userInfo.username;
                    if(vendorId) {
                        loadPOs();
                        loadInvoices();
                    } else {
                        document.querySelector('.main-content').innerHTML = `
                            <div class="alert alert-warning">
                                <strong>Vendor Profile Missing!</strong> 
                                Your user account (email) is not linked to any active Vendor profile in the system. 
                                Please contact the administrator to create a Vendor profile matching your email address.
                            </div>
                        `;
                    }
                } else {
                    window.location.href = 'login.html';
                }
            } catch (e) { 
                console.error('Auth fail:', e);
                window.location.href = 'login.html';
            }
        }

        function showSection(sec) {
            document.getElementById('ordersSection').style.display = 'none';
            document.getElementById('invoicesSection').style.display = 'none';
            document.getElementById('nav-orders').classList.remove('active');
            document.getElementById('nav-invoices').classList.remove('active');
            document.getElementById(sec + 'Section').style.display = 'block';
            document.getElementById('nav-' + sec).classList.add('active');
            if(sec === 'orders') loadPOs();
            if(sec === 'invoices') loadInvoices();
        }

        async function loadPOs() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/purchase-orders/vendor/${vendorId}`, { credentials: 'include' });
                const pos = await res.json();
                
                // Populate invoice select
                document.getElementById('invoicePoSelect').innerHTML = pos.map(p => `<option value="${p.id}">PO-${p.id}: ${p.description}</option>`).join('');

                const tbody = document.getElementById('poTableBody');
                tbody.innerHTML = pos.map(p => `
                    <tr>
                        <td>PO-${p.id}</td>
                        <td>${p.description}</td>
                        <td>${p.expectedDeliveryDate || '-'}</td>
                        <td>$${p.totalAmount}</td>
                        <td><span class="badge-pill badge-info">${p.status}</span></td>
                        <td>
                            ${p.status === 'PENDING' ? `
                                <button class="btn btn-sm btn-success" onclick="updatePO(${p.id}, 'PROCESSING')">Accept</button>
                                <button class="btn btn-sm btn-danger" onclick="updatePO(${p.id}, 'CANCELLED')">Reject</button>
                            ` : `<button class="btn btn-sm btn-primary" onclick="updatePO(${p.id}, 'DELIVERED')">Mark Delivered</button>`}
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function updatePO(id, status) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/purchase-orders/${id}/vendor-status?status=${status}`, { 
                    method: 'PUT',
                    credentials: 'include'
                });
                if(res.ok) loadPOs();
                else alert('Failed to update status');
            } catch (e) { console.error(e); }
        }

        async function loadInvoices() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/invoices`, { credentials: 'include' });
                let inv = await res.json();
                // Filter client side to vendor's POs
                const pRes = await fetch(`${API_BASE_URL}/api/purchase-orders/vendor/${vendorId}`, { credentials: 'include' });
                const pos = await pRes.json();
                const poIds = pos.map(p => p.id);
                inv = inv.filter(i => poIds.includes(i.purchaseOrder ? i.purchaseOrder.id : null));

                const tbody = document.getElementById('invoiceTableBody');
                tbody.innerHTML = inv.map(i => `
                    <tr>
                        <td>${i.invoiceNumber}</td>
                        <td>PO-${i.purchaseOrder ? i.purchaseOrder.id : '-'}</td>
                        <td>${i.invoiceDate}</td>
                        <td>$${i.amount}</td>
                        <td><span class="badge-pill badge-success">${i.status}</span></td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function showInvoiceModal() {
            new bootstrap.Modal(document.getElementById('addInvoiceModal')).show();
        }

        async function submitInvoice() {
            const form = document.getElementById('addInvoiceForm');
            const data = Object.fromEntries(new FormData(form));
            data.amount = parseFloat(data.amount);

            try {
                const res = await fetch(`${API_BASE_URL}/api/invoices?purchaseOrderId=${data.purchaseOrderId}&vendorId=${vendorId}&createdById=${currentUserId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data),
                    credentials: 'include'
                });
                if(res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addInvoiceModal')).hide();
                    form.reset();
                    loadInvoices();
                } else alert('Error submitting invoice');
            } catch (e) { console.error(e); }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
