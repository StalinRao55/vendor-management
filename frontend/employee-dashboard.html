<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Workspace | VMS Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-dashboard.css">
    <script src="js/config.js"></script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="brand">
            <i class="fas fa-briefcase"></i>
            <span>VMS EMPLOYEE</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a class="nav-link active" href="javascript:void(0)" data-section="requests">
                    <i class="fas fa-file-invoice"></i> My Requests
                </a>
            </div>
            
            <div style="margin: 20px 0; border-top: 1px solid #f1f5f9;"></div>

            <div class="nav-item">
                <a class="nav-link" href="javascript:void(0)" id="themeToggle">
                    <i class="fas fa-moon"></i> Theme
                </a>
            </div>
            <div class="nav-item">
                <a class="nav-link text-danger" href="javascript:void(0)" onclick="handleLogout()">
                    <i class="fas fa-power-off"></i> Logout
                </a>
            </div>
        </nav>
    </div>

            <!-- Main Content -->
            <div class="main-content">
                <header class="d-flex justify-content-between align-items-center mb-5 animate-fade-in">
                    <div>
                        <h1 class="fw-bold mb-1"><span id="userNameDisplay">Employee</span> Workspace</h1>
                        <p class="text-secondary">Manage your purchase requests and track approvals easily.</p>
                    </div>
                    <button class="btn-premium" onclick="showAddRequestModal()">
                        <i class="fas fa-plus"></i> New Request
                    </button>
                </header>

                <div id="requestsSection" class="animate-fade-in">
                    <div class="glass-card p-0 overflow-hidden">
                        <div class="px-4 py-3 border-bottom bg-white">
                            <h5 class="mb-0 fw-bold">My Recent Requests</h5>
                        </div>
                        <div class="table-responsive">
                            <table class="custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Suggested Vendor</th>
                                        <th>Amount</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="requestsTableBody">
                                    <!-- Requests go here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Request Modal -->
    <div class="modal fade" id="addRequestModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Purchase Request</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addRequestForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Suggested Vendor (Optional)</label>
                            <select class="form-select" id="suggestedVendorSelect">
                                <option value="">-- No Preference --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Requested Amount ($)</label>
                            <input type="number" step="0.01" class="form-control" name="requestedAmount" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveRequest()">Submit Request</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script>
        let currentUserId = null;
        function showPageError(message) {
            alert(message);
        }

        async function handleLogout() {
            try {
                await fetch(`${API_BASE_URL}/logout`, { method: 'POST' });
            } catch (e) {}
            window.location.href = 'login.html';
        }

        async function init() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/user`, { credentials: 'include' });
                if (response.ok) {
                    const userInfo = await response.json();
                    currentUserId = userInfo.id;
                    document.getElementById('userNameDisplay').textContent = userInfo.username;
                    loadVendors();
                    loadRequests();
                } else {
                    window.location.href = 'login.html';
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = 'login.html';
            }
        }

        async function loadVendors() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/vendors`, { credentials: 'include' });
                const vendors = await response.json();
                const select = document.getElementById('suggestedVendorSelect');
                vendors.forEach(v => {
                    if (v.active) {
                        select.innerHTML += `<option value="${v.id}">${v.name}</option>`;
                    }
                });
            } catch (error) {
                console.error('Error loading vendors:', error);
                showPageError('Unable to load vendors right now.');
            }
        }

        async function loadRequests() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/purchase-requests`, { credentials: 'include' });
                let requests = await response.json();
                
                // Employees should only see their own requests (or backend should enforce this). For demo, filter globally:
                requests = requests.filter(r => r.createdBy && r.createdBy.id === currentUserId);

                const tbody = document.getElementById('requestsTableBody');
                tbody.innerHTML = requests.map(req => `
                    <tr>
                        <td>${req.id}</td>
                        <td>${req.title}</td>
                        <td>${req.suggestedVendor ? req.suggestedVendor.name : '-'}</td>
                        <td>$${req.requestedAmount}</td>
                        <td>${req.requestDate}</td>
                        <td>
                            <span class="badge badge-pill bg-${req.status === 'APPROVED' ? 'success' : req.status === 'REJECTED' ? 'danger' : 'warning'}">
                                ${req.status}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading requests:', error);
                showPageError('Unable to load your requests right now.');
            }
        }

        function showAddRequestModal() {
            new bootstrap.Modal(document.getElementById('addRequestModal')).show();
        }

        async function saveRequest() {
            if (!currentUserId) return alert("User not authenticated.");
            const form = document.getElementById('addRequestForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            data.requestedAmount = parseFloat(data.requestedAmount);
            
            let url = `${API_BASE_URL}/api/purchase-requests?createdById=${currentUserId}`;
            const vendorId = document.getElementById('suggestedVendorSelect').value;
            if (vendorId) url += `&vendorId=${vendorId}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    credentials: 'include'
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addRequestModal')).hide();
                    form.reset();
                    loadRequests();
                } else {
                    alert('Error submitting request');
                }
            } catch (error) {
                console.error('Error:', error);
                showPageError('Unable to submit request right now.');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
