services:
  - type: web
    name: vendor-management
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /login.html
    region: oregon
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
      - key: DB_HOST
        fromDatabase:
          name: vendor-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: vendor-management-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: vendor-management-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: vendor-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: vendor-management-db
          property: password

databases:
  - name: vendor-management-db
    plan: free
    region: oregon
